name: QA-Tests

on:
  push:
    branches: [ main, dev ]
  workflow_call:

permissions: {}

jobs:

  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v6
      - name: Run Pre-Commit Tests 🧪
        uses: j178/prek-action@v2

  unittesting:
    name: Build, install & pytest

    strategy:
      matrix:
        os: ["ubuntu-latest", "macos-latest", "windows-latest"]
        python-version: [ "3.14", "3.12", "3.10" ] # min 4 versions / years

    runs-on: ${{ matrix.os }}

    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-${{ matrix.os }}-${{ matrix.python-version }}
      cancel-in-progress: true

    steps:

      - name: Checkout 🛎️
        uses: actions/checkout@v6

      - name: Install apt-dependencies 🔧
        run: sudo apt install build-essential
        if: ${{ matrix.os == 'ubuntu-latest' }}

      - name: Install uv 🔧 & set up Python 🐍
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          activate-environment: true

      - name: Test-Build core-package 🧱
        run: uv build --clear
        working-directory: "./"

      - name: Install core-package 🧱
        run: uv pip install .[all]
        working-directory: "./"

      - name: Test core-package with pytest 🧫
        run: pytest
        working-directory: "./"
